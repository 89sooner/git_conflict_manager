openapi: 3.1.0
info:
  title: Git Migration Support Platform API
  version: 0.1.0
  summary: Internal API for GitHub Enterprise migration support and quality operations
  description: >-
    Internal API for repository state visualization, PR risk analysis,
    conflict assistance, backout workflows, policy management, and dashboards.
servers:
  - url: https://git-support.internal.example.com
    description: Production
  - url: https://git-support.staging.internal.example.com
    description: Staging
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Organizations
  - name: Repositories
  - name: Branches
  - name: PullRequests
  - name: Conflicts
  - name: Backouts
  - name: Policies
  - name: Dashboards
  - name: Jobs
paths:
  /api/v1/me:
    get:
      tags: [Auth]
      summary: Get current user profile and effective permissions
      operationId: getMe
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/organizations:
    get:
      tags: [Organizations]
      summary: List organizations visible to the current user
      operationId: listOrganizations
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Organization list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'

  /api/v1/repositories:
    get:
      tags: [Repositories]
      summary: List repositories with filters
      operationId: listRepositories
      parameters:
        - in: query
          name: orgId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: search
          required: false
          schema:
            type: string
        - in: query
          name: riskLevel
          required: false
          schema:
            $ref: '#/components/schemas/RiskLevel'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Repository list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryListResponse'

  /api/v1/repositories/{repositoryId}:
    get:
      tags: [Repositories]
      summary: Get repository summary
      operationId: getRepository
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
      responses:
        '200':
          description: Repository summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositorySummaryResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/repositories/{repositoryId}/overview:
    get:
      tags: [Repositories]
      summary: Get repository overview including quality and policy status
      operationId: getRepositoryOverview
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
      responses:
        '200':
          description: Repository overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryOverviewResponse'

  /api/v1/repositories/{repositoryId}/branches:
    get:
      tags: [Branches]
      summary: List branches for a repository
      operationId: listBranches
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - in: query
          name: kind
          required: false
          schema:
            type: string
            enum: [default, release, feature, hotfix, other]
        - in: query
          name: stale
          required: false
          schema:
            type: boolean
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Branch list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchListResponse'

  /api/v1/repositories/{repositoryId}/branches/{branchName}:
    get:
      tags: [Branches]
      summary: Get branch detail and interpreted status
      operationId: getBranchDetail
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/BranchName'
      responses:
        '200':
          description: Branch detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchDetailResponse'

  /api/v1/repositories/{repositoryId}/history-graph:
    get:
      tags: [Branches]
      summary: Get commit graph for a branch compared to a base branch
      operationId: getHistoryGraph
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - in: query
          name: branch
          required: true
          schema:
            type: string
        - in: query
          name: baseBranch
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 10
            maximum: 500
            default: 100
      responses:
        '200':
          description: Commit graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryGraphResponse'

  /api/v1/pull-requests:
    get:
      tags: [PullRequests]
      summary: List pull requests with filters
      operationId: listPullRequests
      parameters:
        - in: query
          name: repositoryId
          schema:
            type: string
            format: uuid
        - in: query
          name: state
          schema:
            type: string
            enum: [open, closed, merged, draft, all]
        - in: query
          name: assignee
          schema:
            type: string
        - in: query
          name: riskLevel
          schema:
            $ref: '#/components/schemas/RiskLevel'
        - in: query
          name: requiresReview
          schema:
            type: boolean
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Pull request list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullRequestListResponse'

  /api/v1/pull-requests/{pullRequestId}:
    get:
      tags: [PullRequests]
      summary: Get pull request detail
      operationId: getPullRequestDetail
      parameters:
        - $ref: '#/components/parameters/PullRequestId'
      responses:
        '200':
          description: Pull request detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullRequestDetailResponse'

  /api/v1/pull-requests/{pullRequestId}/risk-analysis:
    get:
      tags: [PullRequests]
      summary: Get PR risk analysis
      operationId: getPullRequestRiskAnalysis
      parameters:
        - $ref: '#/components/parameters/PullRequestId'
      responses:
        '200':
          description: Risk analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullRequestRiskAnalysisResponse'
        '202':
          description: Analysis in progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncPendingResponse'

  /api/v1/pull-requests/{pullRequestId}/review-recommendations:
    get:
      tags: [PullRequests]
      summary: Get recommended reviewers and CODEOWNERS coverage
      operationId: getReviewRecommendations
      parameters:
        - $ref: '#/components/parameters/PullRequestId'
      responses:
        '200':
          description: Review recommendations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewRecommendationsResponse'

  /api/v1/pull-requests/assist:
    post:
      tags: [PullRequests]
      summary: Prepare PR creation assistance for a source/base branch pair
      operationId: preparePullRequestAssist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullRequestAssistRequest'
      responses:
        '200':
          description: PR assistance result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullRequestAssistResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/conflicts:
    get:
      tags: [Conflicts]
      summary: List detected or user-submitted conflict cases
      operationId: listConflicts
      parameters:
        - in: query
          name: repositoryId
          schema:
            type: string
            format: uuid
        - in: query
          name: type
          schema:
            type: string
            enum: [merge, rebase, cherry-pick, modify-delete, rename]
        - in: query
          name: status
          schema:
            type: string
            enum: [open, resolved, aborted]
      responses:
        '200':
          description: Conflict case list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictCaseListResponse'

  /api/v1/conflicts/{conflictCaseId}:
    get:
      tags: [Conflicts]
      summary: Get conflict case detail and guidance
      operationId: getConflictCaseDetail
      parameters:
        - $ref: '#/components/parameters/ConflictCaseId'
      responses:
        '200':
          description: Conflict case detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictCaseDetailResponse'

  /api/v1/backouts:
    get:
      tags: [Backouts]
      summary: List backout requests and backout history
      operationId: listBackouts
      parameters:
        - in: query
          name: repositoryId
          schema:
            type: string
            format: uuid
        - in: query
          name: branchKind
          schema:
            type: string
            enum: [default, release, feature, hotfix, other]
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, pending-approval, ready, merged, failed, cancelled]
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Backout list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackoutListResponse'

    post:
      tags: [Backouts]
      summary: Create a backout request from a PR or commits
      operationId: createBackout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBackoutRequest'
      responses:
        '201':
          description: Backout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackoutDetailResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/backouts/{backoutId}:
    get:
      tags: [Backouts]
      summary: Get backout detail
      operationId: getBackoutDetail
      parameters:
        - $ref: '#/components/parameters/BackoutId'
      responses:
        '200':
          description: Backout detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackoutDetailResponse'

  /api/v1/backouts/{backoutId}/generate-revert-pr:
    post:
      tags: [Backouts]
      summary: Generate or refresh a revert PR for a backout request
      operationId: generateRevertPullRequest
      parameters:
        - $ref: '#/components/parameters/BackoutId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                dryRun:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Revert PR generated or previewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateRevertPullRequestResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/policies/templates:
    get:
      tags: [Policies]
      summary: List policy templates
      operationId: listPolicyTemplates
      responses:
        '200':
          description: Policy template list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyTemplateListResponse'

    post:
      tags: [Policies]
      summary: Create a policy template
      operationId: createPolicyTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyTemplateRequest'
      responses:
        '201':
          description: Policy template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyTemplateResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/policies/templates/{policyTemplateId}:
    get:
      tags: [Policies]
      summary: Get policy template detail
      operationId: getPolicyTemplate
      parameters:
        - $ref: '#/components/parameters/PolicyTemplateId'
      responses:
        '200':
          description: Policy template detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyTemplateResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Policies]
      summary: Update a policy template
      operationId: updatePolicyTemplate
      parameters:
        - $ref: '#/components/parameters/PolicyTemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePolicyTemplateRequest'
      responses:
        '200':
          description: Policy template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyTemplateResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/dashboards/overview:
    get:
      tags: [Dashboards]
      summary: Get organization-level dashboard summary
      operationId: getDashboardOverview
      parameters:
        - in: query
          name: orgId
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardOverviewResponse'

  /api/v1/jobs/{jobId}:
    get:
      tags: [Jobs]
      summary: Get async job status
      operationId: getJobStatus
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: pageSize
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    RepositoryId:
      in: path
      name: repositoryId
      required: true
      schema:
        type: string
        format: uuid
    BranchName:
      in: path
      name: branchName
      required: true
      schema:
        type: string
    PullRequestId:
      in: path
      name: pullRequestId
      required: true
      schema:
        type: string
        format: uuid
    ConflictCaseId:
      in: path
      name: conflictCaseId
      required: true
      schema:
        type: string
        format: uuid
    BackoutId:
      in: path
      name: backoutId
      required: true
      schema:
        type: string
        format: uuid
    PolicyTemplateId:
      in: path
      name: policyTemplateId
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict with current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

  schemas:
    RiskLevel:
      type: string
      enum: [low, medium, high, critical]

    ErrorCode:
      type: string
      description: |
        Canonical machine-readable error code. Source of truth:
        `docs/03-api/error_code_standard.md`. New codes must be added there
        and mirrored here before use.
      enum:
        - AUTH_REQUIRED
        - AUTH_TOKEN_EXPIRED
        - AUTH_TOKEN_INVALID
        - SSO_ACCESS_DENIED
        - PERMISSION_DENIED
        - REPOSITORY_ACCESS_DENIED
        - ORG_SCOPE_DENIED
        - ADMIN_REQUIRED
        - INVALID_REQUEST
        - INVALID_FILTER
        - VALIDATION_FAILED
        - IDEMPOTENCY_KEY_CONFLICT
        - GITHUB_APP_NOT_INSTALLED
        - GITHUB_APP_PERMISSION_INSUFFICIENT
        - GITHUB_API_RATE_LIMITED
        - GITHUB_API_UNAVAILABLE
        - GITHUB_WEBHOOK_SIGNATURE_INVALID
        - GITHUB_RESOURCE_STALE
        - REPOSITORY_NOT_FOUND
        - BRANCH_NOT_FOUND
        - BASE_BRANCH_REQUIRED
        - BRANCH_NAME_INVALID
        - HISTORY_GRAPH_TOO_LARGE
        - PR_NOT_FOUND
        - PR_ANALYSIS_NOT_READY
        - PR_ANALYSIS_FAILED
        - PR_BASE_BRANCH_INVALID
        - PR_REVIEWERS_REQUIRED
        - PR_CODEOWNERS_MISSING
        - PR_REQUIRED_CHECKS_FAILED
        - PR_MERGE_QUEUE_REQUIRED
        - PR_ALREADY_LINKED
        - CONFLICT_CASE_NOT_FOUND
        - CONFLICT_TYPE_UNSUPPORTED
        - CONFLICT_CONTEXT_INSUFFICIENT
        - CONFLICT_GUIDANCE_NOT_READY
        - CONFLICT_ESCALATION_REQUIRED
        - BACKOUT_NOT_FOUND
        - BACKOUT_REASON_REQUIRED
        - BACKOUT_TARGET_REQUIRED
        - BACKOUT_APPROVER_REQUIRED
        - BACKOUT_ALREADY_EXISTS
        - BACKOUT_REVERT_PR_GENERATION_FAILED
        - BACKOUT_RELEASE_POLICY_BLOCKED
        - BACKOUT_CONFLICT_PREDICTED
        - POLICY_TEMPLATE_NOT_FOUND
        - POLICY_RULE_INVALID
        - POLICY_APPLY_SCOPE_INVALID
        - POLICY_EXCEPTION_REQUIRED
        - POLICY_ENFORCEMENT_BLOCKED
        - POLICY_VERSION_CONFLICT
        - DASHBOARD_RANGE_INVALID
        - ANALYTICS_NOT_READY
        - JOB_NOT_FOUND
        - JOB_ALREADY_TERMINAL
        - JOB_TIMEOUT
        - JOB_WORKER_UNAVAILABLE
        - INTERNAL_SERVER_ERROR
        - DEPENDENCY_UNAVAILABLE
        - DATABASE_UNAVAILABLE
        - CACHE_UNAVAILABLE
        - UPSTREAM_TIMEOUT

    ApiMeta:
      type: object
      additionalProperties: false
      properties:
        requestId:
          type: string
          description: Request tracing id, always present on API responses.
        timestamp:
          type: string
          format: date-time
          description: Server response time in ISO-8601 UTC.
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error, meta]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, retryable]
          properties:
            code:
              $ref: '#/components/schemas/ErrorCode'
            message:
              type: string
              description: Default user-visible message in the active locale.
            details:
              type: object
              additionalProperties: true
            retryable:
              type: boolean
              description: Whether retrying the same request is meaningful.
            userAction:
              type: string
              description: Suggested next user action, if any.
        meta:
          $ref: '#/components/schemas/ApiMeta'

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              type: object
              properties:
                fieldErrors:
                  type: array
                  items:
                    type: object
                    additionalProperties: false
                    properties:
                      field:
                        type: string
                      message:
                        type: string

    UserSummary:
      type: object
      additionalProperties: false
      required: [id, login, displayName]
      properties:
        id:
          type: string
          format: uuid
        login:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
          nullable: true

    UserProfileResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          properties:
            user:
              $ref: '#/components/schemas/UserSummary'
            permissions:
              type: array
              items:
                type: string
        meta:
          $ref: '#/components/schemas/ApiMeta'

    OrganizationSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string

    OrganizationListResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationSummary'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    RepositorySummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        githubNodeId:
          type: string
        name:
          type: string
        fullName:
          type: string
        defaultBranch:
          type: string
        visibility:
          type: string
          enum: [private, internal, public]
        teamName:
          type: string
          nullable: true
        riskLevel:
          $ref: '#/components/schemas/RiskLevel'
        openPullRequestCount:
          type: integer
        staleBranchCount:
          type: integer

    RepositoryListResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/RepositorySummary'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    RepositorySummaryResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/RepositorySummary'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    RepositoryOverviewResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          type: object
          additionalProperties: false
          properties:
            repository:
              $ref: '#/components/schemas/RepositorySummary'
            quality:
              type: object
              additionalProperties: false
              properties:
                buildSuccessRate7d:
                  type: number
                failingRequiredChecksCount:
                  type: integer
                codeOwnerMissingCount:
                  type: integer
            policy:
              type: object
              additionalProperties: false
              properties:
                rulesetEnabled:
                  type: boolean
                mergeQueueEnabled:
                  type: boolean
                exceptionCount:
                  type: integer
            recentEvents:
              type: array
              items:
                $ref: '#/components/schemas/TimelineEvent'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    BranchSummary:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        kind:
          type: string
          enum: [default, release, feature, hotfix, other]
        isProtected:
          type: boolean
        isStale:
          type: boolean
        aheadBy:
          type: integer
        behindBy:
          type: integer
        latestCommitSha:
          type: string

    BranchListResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BranchSummary'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    BranchDetailResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          type: object
          additionalProperties: false
          properties:
            branch:
              $ref: '#/components/schemas/BranchSummary'
            interpretedStatus:
              type: string
            recommendedActions:
              type: array
              items:
                type: string
            linkedPullRequest:
              allOf:
                - $ref: '#/components/schemas/PullRequestSummary'
              nullable: true
            riskSignals:
              type: array
              items:
                $ref: '#/components/schemas/RiskSignal'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    CommitNode:
      type: object
      additionalProperties: false
      properties:
        sha:
          type: string
        shortSha:
          type: string
        message:
          type: string
        author:
          $ref: '#/components/schemas/UserSummary'
        committedAt:
          type: string
          format: date-time
        parents:
          type: array
          items:
            type: string
        refs:
          type: array
          items:
            type: string

    HistoryGraphResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          type: object
