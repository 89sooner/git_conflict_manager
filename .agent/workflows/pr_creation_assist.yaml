workflow: PR_Creation_Assist_Pipeline
trigger:
  event: user_action
  command: /analyze-pr-draft
  inputs: [source_branch, base_branch]

steps:
  - id: fetch_diff
    action: github_api_connector.get_diff
    params:
      source: ${{ inputs.source_branch }}
      base: ${{ inputs.base_branch }}

  - id: analyze_risk
    action: skill_calc_risk_score
    params:
      changed_files: ${{ steps.fetch_diff.output.file_list }}
      target_branch: ${{ inputs.base_branch }}

  - id: generate_checklist
    agent: pr_risk_analyst
    prompt: >
      위험도 점수 결과(${{ steps.analyze_risk.output }})를 바탕으로,
      PR 작성자가 반드시 확인해야 할 필수 체크리스트와 품질 게이트 항목을 생성하라.
      특히 임베디드 빌드 타깃 영향도를 포함해야 한다.

  - id: recommend_reviewers
    agent: policy_manager
    prompt: >
      변경된 파일 목록(${{ steps.fetch_diff.output.file_list }})과 CODEOWNERS 룰셋을 대조하여,
      필수 승인이 필요한 팀과 여유 인력을 고려한 리뷰어를 2명 추천하라.

  - id: format_response
    action: core.format_json
    template: pr_assist_view
    data:
      risk: ${{ steps.analyze_risk.output }}
      checklist: ${{ steps.generate_checklist.output }}
      reviewers: ${{ steps.recommend_reviewers.output }}